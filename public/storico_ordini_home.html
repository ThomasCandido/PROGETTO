<!DOCTYPE html>
<html lang = "it">
    <head>
        <title>Ordini</title>
        <meta charset="UTF-8"> 
        <meta name="author" content="Thomas Candido - Gabriele Iannone">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">

        <!-- css-->
        <link rel="stylesheet" href="CSS/pc/body.css">
        <link rel="stylesheet" href="CSS/pc/menu_bar.css">
        <link rel="stylesheet" href="CSS/pc/barra_di_ricerca.css">
        <link rel="stylesheet" href="CSS/pc/storico_ordini.css">
        <link rel="stylesheet" href="CSS/pc/pdf.css">

        <!-- script-->
        <script src="JS/menu_bar.js"></script>
        <script src ="JS/tema.js"></script>
        <script src="JS/storico_ordini/elimina.js"></script>
        <script src="JS/storico_ordini/ricerca_ordini.js"></script>
        <script src = "JS/storico_ordini/stats.js"></script>
        <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
        <script src="https://chir.ag/projects/ntc/ntc.js"></script>
        <script src = "JS/storico_ordini/export_pdf.js"></script>
        <script src = "JS/storico_ordini/modifica.js"></script>
        <script src="JS/storico_ordini/filtri_ordini.js"></script>
        <script src = "JS/storico_ordini/storico_ordini.js"></script>
        <script src="JS/visuale_utente.js"></script>
        <script>
            if (localStorage.getItem('isAdmin') === 'true')
            {
                document.documentElement.classList.add('is-admin');
            }
        </script>
    </head>
    <body>
        <!-- MENU DI NAVIGAZIONE-->
         <nav>
        <div class="menu_lt" id="menu_smartphone">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul class="menu" id="nav_menu">
            <li class="admin-only"><a href="lista_clienti.html">Clienti</a></li>
            <li class="admin-only"><a href="aggiungi_cliente.html" >Aggiungi Cliente</a></li>
            <li><a href="aggiungi_ordine.html">Aggiungi Ordine</a></li>
            <li><a href="storico_ordini_home.html" class="active">Storico Ordine</a></li>
            <li class="theme-item">
                <button id="themeBtn" class="theme-button">🎨</button>
                <ul class="theme-dropdown" id="themeMenu">
                    <li class="dropdown-header">Tema</li>
                    <li>
                        <label class="theme-option">
                            <input type="radio" name="theme" value="light" onchange="applyTheme('light')"> ☀️ Chiaro
                        </label>
                    </li>
                    <li>
                        <label class="theme-option">
                            <input type="radio" name="theme" value="dark" onchange="applyTheme('dark')"> 🌙 Scuro
                        </label>
                    </li>
                </ul>
            </li>
          
            <li class="user-item">
                <img src="allegati/log.png" class="user-avatar" id="userBtn" alt="login" title="Menu Utente">
                <ul class="user-dropdown" id="userMenu">
                    <li class="dropdown-header">Account</li>
                    <li><a href="aggiungi_cliente.html?edit=true">⚙️ Modifica Profilo</a></li>
                    <li><hr></li>
                    <li><a href="/logout" class="logout-link">🚪 Logout</a></li>
                </ul>
            </li>
                
        </ul>
    </nav>
    

    <!-- CONTAINER X VISUALIZZATORE STATISTICHE-->
    <div class="stats-container">
        <button id="openStats" class="btn-stats" title="Vedi Statistiche">📊 Statistiche Vendite</button>
    </div>

        <div id="stats" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h2>🏆 Top 5 Capi più Venduti</h2>
                <p>Classifica per Tipologia e Colore</p>
                <hr>
                <div class="chart-container">
                    <!--contenuto dentro canvas-->
                    <canvas id="graficoCanvas"></canvas>
                </div>
            </div>
        </div>


        <!-- BARRA DI RICERCA + FILTRI DI VISUALIZZAZIONE PAGINA-->
        <div class="ricerca-completa">
            <form method="get" class="ricerca">
                <input type="text" id="inputRicerca" placeholder="Cerca Ordine...">
                
                <button type="submit" title="Reflesh">&#8635;</button>
        
                <div class="filter-dropdown-container">
                    <button type="button" id="filterBtn" class="btn-filter">🎚️</button>
                    
                    <div id="filterMenu" class="filter-dropdown">
                        <p class="filter-title">Ordina per:</p>
                        <label class="filter-option"><input type="radio" name="sort" value="id-asc">🔢 ID Crescente</label>
                        <label class="filter-option"><input type="radio" name="sort" value="date-new" checked> 📅 Più recenti</label>
                        <label class="filter-option"><input type="radio" name="sort" value="price-asc"> 📈 Prezzo crescente</label>
                        <label class="filter-option"><input type="radio" name="sort" value="price-desc"> 📉 Prezzo decrescente</label>
                        <hr>
                        <p class="filter-title">Mostra Stato:</p>
                        <label class="filter-option"><input type="checkbox" class="status-filter" value="Ordinato" checked> 🔴 Ordinato</label>
                        <label class="filter-option">
                            <input type="checkbox" class="status-filter" value="In Lavorazione" checked> 
                            <span>🟡 In Lavorazione</span>
                        </label>
                        
                        <label class="filter-option">
                            <input type="checkbox" class="status-filter" value="Evaso" checked> 
                            <span>🟢 Evaso</span>
                        </label>
                        
                        <label class="filter-option">
                            <input type="checkbox" class="status-filter" value="Archiviato" checked> 
                            <span>⚪ Archiviato</span>
                        </label>
                        <button type="button" id="applyFilters" class="btn-apply">Applica Filtri</button>
                    </div>
                </div>
            </form>
        </div>



        <!-- LISTA ORDINI-->
        <ul class="lista_ordini">
            
        </ul>


        <!-- bottoni a scomparsa-->
        <button id="btn_elimina_multiplo" class="botton_fluttuante btn_elimina" title="Elimina Selezionati">&#128465;</button>
        <a href="aggiungi_ordine.html" class="botton_fluttuante btn_aggiungi" title="Aggiungi Nuovo Ordine">+</a>
    

        <!-- pop up visualizza allegato-->
        <div id="modalAllegato" class="mod_pop" onclick="chiudiPopup()">
            <span class="close-modal">&times;</span>
            <img id="img_pop-up" src="" alt="Allegato">
        </div>
    </body>
</html>
