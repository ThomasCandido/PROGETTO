<!DOCTYPE html>
<html lang="it">
<head>
    <title>Aggiungi Ordine</title>
    <meta charset="UTF-8">
    <meta name="author" content="Thomas Candido - Gabriele Iannone">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="CSS/pc/body.css">
    <link rel="stylesheet" href="CSS/pc/aggiungi_ordine.css">
    <link rel="stylesheet" href="CSS/pc/menu_bar.css">
    <script src="JS/menu_bar.js"></script>
    <script src="JS/tema.js"></script>
    <script src="JS/aggiungi_ordine.js"></script>
</head>

<body>
    <!-- MENU DI NAVIGAZIONE-->
    <nav>
        <div class="menu_lt" id="menu_smartphone">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul class="menu" id="nav_menu">
            <li><a href="lista_clienti.html">Clienti</a></li>
            <li><a href="aggiungi_cliente.html">Aggiungi Cliente</a></li>
            <li><a href="aggiungi_ordine.html" class="active">Aggiungi Ordine</a></li>
            <li><a href="storico_ordini_home.html">Storico Ordine</a></li>
           <li class="theme-item">
    <button id="themeBtn" class="theme-button">🎨</button>
    
    <ul class="theme-dropdown" id="themeMenu">
        <li class="dropdown-header">Tema</li>
        <li>
            <label class="theme-option">
                <input type="radio" name="theme" value="light" onchange="applyTheme('light')"> ☀️ Chiaro
            </label>
        </li>
        <li>
            <label class="theme-option">
                <input type="radio" name="theme" value="dark" onchange="applyTheme('dark')"> 🌙 Scuro
            </label>
        </li>
    </ul>
</li>
            <li><img src="allegati/log.png" style="border-radius: 50%;" height="20px" width="20px" alt="login" title="login"></li>
                
        </ul>
    </nav>

    <!-- RIQUADRO RIEPILOGO-->
    <div class="container_ordini">
        <h2>Riepilogo Ordine Corrente</h2>
    
        <table border="1" class="tabella_stile_lista" id="tabella_riepilogo">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Cliente</th>
                    <th>Stato</th>
                    <th>Marchio</th>
                    <th>Tipologia</th>
                    <th>Colore</th>
                    <th>Taglia</th>
                    <th>Quantità</th>
                    <th>Prezzo Cl.</th>
                    <th>Prezzo Az.</th>
                    <th>Pers. (Note)</th>
                    <th>File</th> 
                    <th>Anteprima</th> 
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody id="corpo_tabella_ordini"></tbody>
        </table>
    
        <div class="azioni_tabella">
            <button type="button" class="btn_salva" onclick="salvaTuttoNelDatabase()" title="Salva tutto nel database">SALVA &#128722;</button>
            <button type="button" class="btn_refresh" onclick="svuotaTabella()" title="Svuota tabella">SVUOTA TABELLA &#128228;</button>
        </div>
    </div>

    <!--RIQUADRO FORM-->
    <div class="riquadro_form">
        <h3>Inserisci Dettagli Ordine</h3>
        <form id="form_ordine">
            <table class="tabella_ordine">
                <tbody>
                    <tr>
                        <td colspan="1">
                            <input type="text" id="f_cliente" placeholder="Nome Cliente / Azienda" required>
                        </td>
                        <td colspan="1">
                            <select id="f_stato" class="select-stato" required>
                                <option value="" selected disabled>Stato Ordine</option>
                                <option value="ordinato" class="stato-rosso">🔴 Ordinato</option>
                                <option value="lavorazione" class="stato-giallo">🟡 In Lavorazione</option>
                                <option value="evaso" class="stato-verde">🟢 Evaso</option>
                                <option value="archiviato" class="stato-grigio">⚪ Archiviato</option>
                            </select>
                        </td>
                        <td colspan="2"><input type="date" id="f_data" required></td>
                    </tr>

                    <tr>
                        <td><input type="text" id="f_marchio" placeholder="Marchio" required></td>
                        <td><input type="text" id="f_tipologia" placeholder="Tipologia" required></td>
                        <td><input type="color" id="f_colore" title="Colore"></td>
                        <td>
                            <select id="f_taglia" required>
                                <option value="" selected disabled>Taglia</option>
                                <option value="S">S</option>
                                <option value="M">M</option>
                                <option value="L">L</option>
                                <option value="XL">XL</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td><input type="number" id="f_quantita" placeholder="Qtà" min="1" required></td>
                        <td colspan="1"><input type="number" id="f_prezzo_cl" step="0.01" placeholder="€ Cliente" required></td>
                        <td colspan="2"><input type="number" id="f_prezzo_az" step="0.01" placeholder="€ Azienda" required></td>
                    </tr>

                    <tr>
                        <td colspan="4">
                            <textarea id="f_note" class="area-note" placeholder="Dettagli personalizzazione..."></textarea>
                        </td>
                    </tr>

                    <tr>
                        <td colspan="4">
                            <div class="campi_sotto">
                                <input type="file" id="input_file_nascosto" style="display: none;">
                                <button type="button" class="bottone_ic" onclick="document.getElementById('input_file_nascosto').click()" title="Allega Foto">&#128206;</button>
                                <button type="reset" class="bottone_ic" title="Reset Form">&#x21BB;</button>
                                <button type="button" class="bottone_ic" onclick="aggiungiRigaTabella()" title="Aggiungi a Riepilogo">&#10133;</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </form>
    </div>

</body>
</html>
