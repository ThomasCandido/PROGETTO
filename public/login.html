<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Thomas Candido - Gabriele Iannone">
    <title>Login Gestionale Ordini</title>
    <link rel="stylesheet" href="CSS/pc/login.css">
    <link rel="stylesheet" href="CSS/pc/body.css">
</head>
<body>

    <div class="login_cnt">
        <div class="login-header">
            <img src="allegati/log.png" alt="Log" class="logo-login">
            <h2>Accesso Gestionale</h2>
            <p>Inserisci le tue credenziali per continuare</p>
        </div>
        
        <form action="/login" method="POST">
            
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Inserisci email" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Inserisci password" required>
            </div>

            <button type="submit" class="btn-login">Accedi</button>
            
        </form>
        
        <div class="login-footer">
            <p >
                <a href="#">Password dimenticata?</a>
            </p>
            <p >
                Non hai un account? <a href="registrazione.html" style="font-weight: bold;">Registrati ora</a>
            </p>
        </div>
    </div>

</body>
</html>
