<!DOCTYPE html>
<html lang="it">

<!-- Pagina lista clienti -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Thomas Candido - Gabriele Iannone">

    <title>Lista Clienti</title>

    <!-- Fogli di stile -->
    <link rel="stylesheet" href="CSS/pc/body.css">
    <link rel="stylesheet" href="CSS/pc/menu_bar.css">
    <link rel="stylesheet" href="CSS/pc/lista_clienti.css">
    <link rel="stylesheet" href="CSS/pc/barra_di_ricerca.css">

    <!-- Script -->
    <script src="JS/menu_bar.js"></script>
    <script src="JS/tema.js"></script>
    <script src="JS/visuale_utente.js"></script>
    <script src="JS/lista-clienti.js"></script>

    <!-- Abilita sezioni admin -->
    <script>
        if (localStorage.getItem('isAdmin') === 'true') {
            document.documentElement.classList.add('is-admin');
        }
    </script>
</head>

<body class="pagina-con-sfondo">

    <!-- Barra navigazione -->
    <nav>

        <!-- Menu hamburger smartphone -->
        <div class="menu_lt" id="menu_smartphone">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <ul class="menu" id="nav_menu">

            <!-- Voci admin -->
            <li class="admin-only"><a href="lista_clienti.html" class="active">Clienti</a></li>
            <li class="admin-only"><a href="aggiungi_cliente.html">Aggiungi Cliente</a></li>

            <!-- Voci comuni -->
            <li><a href="aggiungi_ordine.html">Aggiungi Ordine</a></li>
            <li><a href="storico_ordini_home.html">Storico Ordine</a></li>

            <!-- Selettore tema -->
            <li class="theme-item">
                <button id="themeBtn" class="theme-button">🎨</button>

                <ul class="theme-dropdown" id="themeMenu">
                    <li class="dropdown-header">Tema</li>

                    <li>
                        <label class="theme-option">
                            <input type="radio" name="theme" value="light" onchange="applyTheme('light')">
                            ☀️ Chiaro
                        </label>
                    </li>

                    <li>
                        <label class="theme-option">
                            <input type="radio" name="theme" value="dark" onchange="applyTheme('dark')">
                            🌙 Scuro
                        </label>
                    </li>
                </ul>
            </li>

            <!-- Menu utente -->
            <li class="user-item">
                <img src="allegati/log.png" class="user-avatar" id="userBtn" alt="login" title="Menu Utente">

                <ul class="user-dropdown" id="userMenu">
                    <li class="dropdown-header">Account</li>

                    <!-- Modifica profilo -->
                    <li><a href="aggiungi_cliente.html?edit=true">⚙️ Modifica Profilo</a></li>

                    <li><hr></li>

                    <li><a href="/logout" class="logout-link">🚪 Logout</a></li>
                </ul>
            </li>

        </ul>
    </nav>

    <br><br>

    <!-- Barra ricerca -->
    <div class="ricerca-completa">

        <form class="ricerca" onsubmit="return false;">

            <!-- Ricerca clienti -->
            <input type="text" id="barraRicerca" placeholder="Cerca cliente, e-mail, telefono..." onkeyup="filtraClienti()">

            <button type="button" title="Cerca">&#8981;</button>

            <!-- Ordinamento -->
            <select id="filtroOrdinamento" class="tendina-ordinamento" onchange="ordinaClienti()">
                <option value="">↕️ Ordina per...</option>
                <option value="societa-asc">🏢 Società (Crescente)</option>
                <option value="societa-desc">🏢 Società (Decrescente)</option>
                <option value="cognome-asc">👤 Cognome (Crescente)</option>
                <option value="cognome-desc">👤 Cognome (Decrescente)</option>
                <option value="nome-asc">👤 Nome (Crescente)</option>
                <option value="nome-desc">👤 Nome (Decrescente)</option>
            </select>

        </form>
    </div>

    <br><br>

    <!-- Contenitore clienti -->
    <div id="contenitore-clienti" class="griglia-clienti"></div>

    <!-- Pulsanti fluttuanti -->
    <div id="azioni-fluttuanti" class="azioni-fluttuanti">

        <!-- Elimina clienti -->
        <button id="btn-elimina-fluttuante" class="botton_fluttuante btn_elimina" title="Elimina Selezionati">
            🗑️
        </button>

        <!-- Aggiungi cliente -->
        <a href="aggiungi_cliente.html" class="botton_fluttuante btn_aggiungi" title="Aggiungi Cliente">
            +
        </a>

    </div>
</body>

</html>
